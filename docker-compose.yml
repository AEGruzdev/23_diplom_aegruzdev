version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: diplom_db
      POSTGRES_USER: diplom_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diplom_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: diplom_db
      DB_USER: diplom_user
      DB_PASSWORD: secure_password
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: